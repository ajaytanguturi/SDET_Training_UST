<div class="profile-grid">

    <div class="detail-box">

        <label>Name</label>

        <span>

            {{ profile?.name }}

        </span>

    </div>


    <div class="detail-box">

        <label>Email</label>

        <span>

            {{ profile?.email }}

        </span>

    </div>

    <div class="detail-box">

        <label>Phone</label>

        <span>

            {{ profile?.phone }}

        </span>

    </div>

    <div class="detail-box">

        <label>Employee ID</label>

        <span>

            {{ profile?.employeeId }}

        </span>

    </div>

    <div class="detail-box">

        <label>Department</label>

        <span>

            {{ profile?.department }}

        </span>

    </div>

    <div class="detail-box">

        <label>Designation</label>

        <span>

            {{ profile?.designation }}

        </span>

    </div>

    <div class="detail-box">

        <label>Status</label>

        <span>

            {{ profile?.status }}

        </span>

    </div>

    <div class="detail-box">

        <label>Joining Date</label>

        <span>

            {{ profile?.joiningDate | date:'mediumDate' }}

        </span>

    </div>

</div>
