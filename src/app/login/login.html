<div class="login-container">
    <div class="left-section">

        <div class="hospital-logo">
            <img src="hms_logo.png" alt="Elevance HMS Logo">
        </div>

        <h1 class="hospital-title">
            Elevance Healthcare HMS
        </h1>

        <p class="hospital-subtitle">
            Secure and intelligent healthcare management system
            for doctors, nurses, staff and patients.
        </p>


        <div class="image-box">
            <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?q=80&w=1200&auto=format&fit=crop"
                alt="Doctors">
        </div>

    </div>

    <!-- Right Side -->
    <div class="right-section">

        <div class="login-card">

            <h2 class="login-title">Welcome Back</h2>

            <p class="login-subtitle">
                Login to access the HMS dashboard
            </p>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-input" formControlName="email">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" formControlName="password">
                </div>

                <div class="form-options">
                    <div class="remember">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </div>

                    <a href="#" class="forgot-password">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>
            </form>
            <div class="footer-text">

                Don't have an Account ?

                <a routerLink="/signup">
                    Signup
                </a>

            </div>
            <p class="footer-text">
                HMS Secure Portal
            </p>

        </div>

    </div>

</div>
